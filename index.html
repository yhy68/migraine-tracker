<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="偏头痛发作记录工具">
  <meta name="theme-color" content="#EDF6FB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="偏头痛记录">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='22' fill='%235BA4CF' width='100' height='100'/><ellipse cx='50' cy='45' rx='22' ry='18' fill='white'/><circle cx='40' cy='40' r='3' fill='%235BA4CF'/><circle cx='56' cy='40' r='3' fill='%235BA4CF'/><ellipse cx='48' cy='47' rx='4' ry='2.5' fill='%23F2A5B5'/></svg>">
  <link rel="manifest" href="manifest.json">
  <title>偏头痛记录</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #app { opacity: 0; transition: opacity 0.2s; }
    #app.loaded { opacity: 1; }
  </style>
</head>
<body>

  <div class="cloud-deco a">
    <svg viewBox="0 0 100 50"><ellipse cx="30" cy="32" rx="28" ry="16" fill="#7CC5EA"/><ellipse cx="60" cy="26" rx="30" ry="18" fill="#7CC5EA"/><ellipse cx="85" cy="34" rx="18" ry="12" fill="#7CC5EA"/></svg>
  </div>
  <div class="cloud-deco b">
    <svg viewBox="0 0 90 45"><ellipse cx="22" cy="28" rx="20" ry="14" fill="#D6EDF8"/><ellipse cx="50" cy="22" rx="25" ry="15" fill="#D6EDF8"/></svg>
  </div>
  <div class="cloud-deco c">
    <svg viewBox="0 0 80 45"><ellipse cx="25" cy="30" rx="22" ry="14" fill="#F2A5B5"/><ellipse cx="55" cy="26" rx="25" ry="15" fill="#F2A5B5"/></svg>
  </div>
  <div class="cloud-deco d">
    <svg viewBox="0 0 100 50"><ellipse cx="25" cy="30" rx="24" ry="15" fill="#C5E4F5"/><ellipse cx="55" cy="24" rx="28" ry="16" fill="#C5E4F5"/></svg>
  </div>
  <div class="cloud-deco e">
    <svg viewBox="0 0 70 40"><ellipse cx="20" cy="25" rx="18" ry="12" fill="#B8D8F0"/><ellipse cx="40" cy="20" rx="22" ry="14" fill="#B8D8F0"/></svg>
  </div>
  <div class="cloud-deco f">
    <svg viewBox="0 0 85 45"><ellipse cx="25" cy="28" rx="20" ry="13" fill="#D0E8F8"/><ellipse cx="50" cy="23" rx="24" ry="15" fill="#D0E8F8"/></svg>
  </div>
  <div class="cloud-deco g">
    <svg viewBox="0 0 60 35"><ellipse cx="18" cy="22" rx="16" ry="10" fill="#E8C8D8"/><ellipse cx="38" cy="18" rx="20" ry="12" fill="#E8C8D8"/></svg>
  </div>
  <div class="cloud-deco h">
    <svg viewBox="0 0 75 40"><ellipse cx="22" cy="26" rx="19" ry="12" fill="#C8D8E8"/><ellipse cx="48" cy="21" rx="23" ry="14" fill="#C8D8E8"/></svg>
  </div>

  <div class="app-container">
    <header class="app-header" id="header"></header>
    <main id="app">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>document.getElementById('app').classList.add('loaded');</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
